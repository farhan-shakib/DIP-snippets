
<svg width="100%" viewBox="0 0 680 320">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LEFT: Formula card -->
  <g class="c-purple">
    <rect x="40" y="40" width="200" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="72" text-anchor="middle">Transformation formula</text>
    <text class="ts" x="140" y="96" text-anchor="middle">s = L − 1 − r</text>
  </g>
  <text class="ts" x="140" y="140" text-anchor="middle">r = input intensity</text>
  <text class="ts" x="140" y="158" text-anchor="middle">s = output intensity</text>
  <text class="ts" x="140" y="176" text-anchor="middle">L = 256 for 8-bit images</text>

  <!-- Examples row -->
  <g class="c-gray">
    <rect x="40" y="210" width="90" height="80" rx="8" stroke-width="0.5"/>
    <text class="ts" x="85" y="243" text-anchor="middle">r = 0</text>
    <text class="th" x="85" y="268" text-anchor="middle">s = 255</text>
    <text class="ts" x="85" y="284" text-anchor="middle">black → white</text>
  </g>
  <g class="c-gray">
    <rect x="155" y="210" width="90" height="80" rx="8" stroke-width="0.5"/>
    <text class="ts" x="200" y="243" text-anchor="middle">r = 128</text>
    <text class="th" x="200" y="268" text-anchor="middle">s = 127</text>
    <text class="ts" x="200" y="284" text-anchor="middle">mid → mid</text>
  </g>

  <!-- CENTER: Graph -->
  <text class="ts" x="390" y="36" text-anchor="middle">s = 255 − r  (identity vs negative)</text>

  <!-- Axes -->
  <line x1="310" y1="260" x2="490" y2="260" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="260" x2="310" y2="50" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="496" y="264">r</text>
  <text class="ts" x="304" y="46" text-anchor="end">s</text>
  <text class="ts" x="308" y="264" text-anchor="end">0</text>
  <text class="ts" x="308" y="68" text-anchor="end">255</text>
  <text class="ts" x="490" y="274" text-anchor="end">255</text>

  <!-- Identity line (gray dashed) -->
  <line x1="310" y1="260" x2="490" y2="68" stroke="var(--s)" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <text class="ts" x="500" y="72" opacity="0.6">identity</text>

  <!-- Negative line (purple solid) -->
  <line x1="310" y1="68" x2="490" y2="260" stroke="#7F77DD" stroke-width="2"/>
  <text class="ts" x="500" y="255" fill="#7F77DD">negative</text>

  <!-- Midpoint dot -->
  <circle cx="400" cy="164" r="4" fill="#7F77DD"/>
  <text class="ts" x="404" y="158">(128, 127)</text>

  <!-- RIGHT: Use cases -->
  <g class="c-teal">
    <rect x="530" y="40" width="120" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="590" y="58" text-anchor="middle">Applications</text>
    <text class="ts" x="590" y="75" text-anchor="middle">click to explore</text>
  </g>

  <g class="node c-teal" onclick="sendPrompt('How are image negatives used in medical X-ray imaging?')">
    <rect x="530" y="100" width="120" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="590" y="123" text-anchor="middle">Medical X-rays ↗</text>
  </g>
  <g class="node c-teal" onclick="sendPrompt('How do image negatives help in enhancing dark regions of an image?')">
    <rect x="530" y="148" width="120" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="590" y="171" text-anchor="middle">Dark region detail ↗</text>
  </g>
  <g class="node c-teal" onclick="sendPrompt('How are image negatives used in forensic image analysis?')">
    <rect x="530" y="196" width="120" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="590" y="219" text-anchor="middle">Forensic analysis ↗</text>
  </g>
  <g class="node c-teal" onclick="sendPrompt('How are image negatives used for artistic or visual effects?')">
    <rect x="530" y="244" width="120" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="590" y="267" text-anchor="middle">Artistic effects ↗</text>
  </g>
</svg>
